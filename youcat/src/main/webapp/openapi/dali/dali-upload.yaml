name: UPLOAD
in: query
description: |
  specify a comma-separated name,location pair for a temporary 
  resource to be uploaded and used in the request
required: false
explode: true
schema:
    type: array
    items:
      type: string
      pattern: '^[a-zA-Z]\w*,\S+$'
    example: 
      - tmp1,https://example.net/tmp.vot
      - tmp2,param:inline-votable
